<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Tactical Chef - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Catering for small groups in Western Mass">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Italianno' rel='stylesheet'>
</head>

<body>
    <!-- Hero section -->
    <div class="hero-container hero-half">
        <div id="navbar-placeholder"></div>
        <img id="hero-background-partial" class="unselectable" src="images/subpages/hero-2.jpg" alt="Hero image">
    </div>

    <main id="main">
        <section id="about-intro" class="intro">
            <h1 class="section-title">Our Menu</h1>
            <hr class="section-divider">
            <hr class="section-divider">
            <p class="section-text">Our menu is fully customizable to your event. Let us know what your ideal menu looks
                like! <br>See below for menu inspiration and photos from past events.</p>
        </section>
        <section id="gallery">
            <div class="gallery-grid" id="galleryGrid"></div>
        </section>

        <!-- Modal -->
        <div id="galleryModal" class="gallery-modal">
            <span class="gallery-close" id="galleryClose">&times;</span>
            <img id="galleryModalImg" class="gallery-modal-img" alt="">
            <div id="galleryCaption" class="gallery-caption"></div>
        </div>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Load navbar and footer partial
        fetch('navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-placeholder').innerHTML = html;

                const hamburgerBtn = document.querySelector('.navbar-hamburger');
                const hamburgerIcon = document.querySelector('.navbar-hamburger i');
                const menu = document.querySelector('.navbar-menu');

                function closeMenu() {
                    menu.classList.remove('active');
                    hamburgerIcon.classList.add('fa-bars');
                    hamburgerIcon.classList.remove('fa-xmark');
                    document.body.classList.remove('menu-open');
                }

                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent the document click handler from firing

                    menu.classList.toggle('active');
                    hamburgerIcon.classList.toggle('fa-bars');
                    hamburgerIcon.classList.toggle('fa-xmark');
                    document.body.classList.toggle('menu-open');
                });

                // Close when clicking outside
                document.addEventListener('click', (e) => {
                    if (
                        menu.classList.contains('active') &&
                        !menu.contains(e.target) &&
                        !hamburgerBtn.contains(e.target)
                    ) {
                        closeMenu();
                    }
                });
            });

        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });

        // Gallery
        const galleryItems = [
            ["gallery_5.jpg", "Fresh cucumber topped with smoked salmon, cream cheese, and dill"],
            ["gallery_9.jpg", "Preparations behind the scenes"],
            ["gallery_7.jpg", "Classic bruschetta served on toasted slices of baguette with butter and garlic (GF option)"],
            ["gallery_14.jpg", "Pan-seared ribeye steak atop peppery arugula finished with a drizzle of umami aioli (GF option)"],
            ["gallery_10.jpg", "Mediterranean salmon with olives, capers, shallots, and Sicilian oregano, served on a bed of freshly roasted asparagus (GF)"],
            ["gallery_15.jpg", "Charcuterie board table with hand-selected cured meats, cheeses, fruits, and gourmet accoutrements"],
            ["gallery_13.jpg", "Cajun grilled shrimp"],
            ["gallery_6.jpg", "Fresh cucumber topped with smoked salmon, cream cheese, and dill"],
            ["gallery_11.jpg", "Scallop mixed-green salad with tomatoes and crispy bacon"],
            ["gallery_8.jpg", "Roasted chicken breast and crispy bacon paired with ripe avocado on a bed of arugula tossed in light lemon vinaigrette"],
            ["gallery_3.jpg", "Southern beef and noodles with pearl onions and sausage"],
            ["gallery_12.jpg", "Mediterranean salmon with olives, capers, shallots, and Sicilian oregano, served on a bed of freshly roasted asparagus (GF)"],
            ["gallery_2.jpg", "Preparations behind the scenes"],
            ["gallery_4.jpg", "Ribeye steak platter"],
            ["gallery_16.jpg", "Creamy mushroom chicken"],
            ["gallery_18.jpg", "Whole stuffed chicken roasted with lemon pepper and herbs"],
            ["gallery_1.jpg", "Preparations behind the scenes"],
            ["gallery_17.jpg", "Classic breakfast plate"],
        ];

        const grid = document.getElementById("galleryGrid");
        const modal = document.getElementById("galleryModal");
        const modalImg = document.getElementById("galleryModalImg");
        const caption = document.getElementById("galleryCaption");
        const closeBtn = document.getElementById("galleryClose");

        // build gallery
        galleryItems.forEach((item, index) => {
            file_name = item[0];
            const div = document.createElement("div");
            div.className = "gallery-item";

            const img = document.createElement("img");
            img.src = `images/gallery/${file_name}`;
            img.alt = item[1];

            div.appendChild(img);

            div.addEventListener("click", () => {
                modal.classList.add("active");
                modalImg.src = img.src;
                caption.textContent = item[1];
            });

            grid.appendChild(div);
        });

        // close modal
       function closeModal() {
            modal.classList.remove("active");

            setTimeout(() => {
                modalImg.src = "";
            }, 250); // match CSS transition time
        }
        closeBtn.addEventListener("click", closeModal);
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });

        document.addEventListener("keydown", (e) => {
            if (e.key === "Escape") closeModal();
        });
    </script>

</body>

</html>
