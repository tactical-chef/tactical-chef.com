<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Tactical Chef - Menu</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Catering for small groups in Western Mass">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Italianno' rel='stylesheet'>
</head>

<body>
    <!-- Hero section -->
    <div class="hero-container hero-half">
        <div id="navbar-placeholder"></div>
        <img id="hero-background-partial" src="images/hero-2.jpg" alt="Hero image">
    </div>

    <main id="main">
        <section id="about-intro" class="intro">
            <h1 class="section-title">Our Menu</h1>
            <hr class="section-divider">
            <hr class="section-divider">
            <p class="section-text">Our menu is fully customizable to your event. Let us know what your ideal menu looks like! <br>See below for menu inspiration and photos from past events.</p>
        </section>
        <section id="gallery">
            <div class="section">
                MUST CAPTION IMAGES TO SERVE AS MENU IDEAS
            </div>
        </section>

    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Load navbar and footer partial
        fetch('navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-placeholder').innerHTML = html;
            });

        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });

        // Smooth scroll for home page chevron
        document.addEventListener('DOMContentLoaded', () => {
            const arrow = document.getElementById('landing-arrow');

            arrow.addEventListener('click', () => {
                document.querySelector('main').scrollIntoView({
                    behavior: 'smooth',
                    block: 'start'
                });
            });
        });

        // Scroll reveal animation
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.classList.add("animate");
                    observer.unobserve(entry.target); // only animate once
                }
            });
        }, {
            threshold: 0.3
        });
        document.querySelectorAll(".section").forEach(section => {
            observer.observe(section);
        });

    </script>

</body>

</html>
