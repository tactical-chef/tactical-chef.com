<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>The Tactical Chef</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Catering for small groups in Western Mass">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <!-- Navbar placeholder -->
    <div id="navbar-placeholder"></div>

    <!-- Hero section -->
    <div class="hero-container hero-full">
        <img id="hero-background" src="images/home/landing-image.jpg" alt="Full screen landing page image">
        <img id="hero-title" src="images/home/landing-title.png" alt="The Tactical Chef title">
        <a id="contact-us-btn" href="contact.html"><img id="contact-us-img" src="images/home/contact-us.png" alt="Contact us button"></a>
        <i id="landing-arrow" class="fas fa-chevron-down"></i>
    </div>

    <main>
        <section>
            <h1>Welcome to The Tactical Chef</h1>
            <p>We specialize in catering for small groups in Western Mass. Let us bring a tactical touch to your next event.</p>
        </section>
    </main>

    <footer>
        &copy; 2026 The Tactical Chef. All rights reserved.
    </footer>

    <!-- Load navbar partial -->
    <script>
        fetch('navbar.html')
          .then(response => response.text())
          .then(html => {
              document.getElementById('navbar-placeholder').innerHTML = html;
          });

        // Smooth scroll for home page chevron
        document.addEventListener('click', function(e) {
            if(e.target && e.target.id === 'landing-arrow'){
                window.scrollTo({
                    top: document.querySelector('main').offsetTop - 60,
                    behavior: 'smooth'
                });
            }
        });
    </script>

</body>
</html>
