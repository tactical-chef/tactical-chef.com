<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>The Tactical Chef - Contact Us</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Catering for small groups in Western Mass">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href='https://fonts.googleapis.com/css?family=Italianno' rel='stylesheet'>
</head>

<body>
    <!-- Hero section -->
    <div class="hero-container hero-half">
        <div id="navbar-placeholder"></div>
        <img id="hero-background-partial" class="unselectable" src="images/subpages/hero-1.jpg" alt="Hero image">
    </div>

    <main id="main">
        <section id="contact-intro" class="intro">
            <h1 class="section-title">Contact Us</h1>
            <hr class="section-divider">
            <hr class="section-divider">
            <p class="section-text">Please do not hesitate to reach out! We are happy to answer any questions.</p>
            <div class="subpage-textbox">
                <p class="section-text contact-info">Call or Text: <a>000-000-0000</a></p>
                <p class="section-text contact-info">Email: <a
                        href="mailto:AL@tactical-chef.com">AL@tactical-chef.com</a></p>
                <br>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        // Load navbar and footer partial
        fetch('navbar.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('navbar-placeholder').innerHTML = html;

                const hamburgerBtn = document.querySelector('.navbar-hamburger');
                const hamburgerIcon = document.querySelector('.navbar-hamburger i');
                const menu = document.querySelector('.navbar-menu');

                function closeMenu() {
                    menu.classList.remove('active');
                    hamburgerIcon.classList.add('fa-bars');
                    hamburgerIcon.classList.remove('fa-xmark');
                    document.body.classList.remove('menu-open');
                }

                hamburgerBtn.addEventListener('click', (e) => {
                    e.stopPropagation(); // Prevent the document click handler from firing

                    menu.classList.toggle('active');
                    hamburgerIcon.classList.toggle('fa-bars');
                    hamburgerIcon.classList.toggle('fa-xmark');
                    document.body.classList.toggle('menu-open');
                });

                // Close when clicking outside
                document.addEventListener('click', (e) => {
                    if (
                        menu.classList.contains('active') &&
                        !menu.contains(e.target) &&
                        !hamburgerBtn.contains(e.target)
                    ) {
                        closeMenu();
                    }
                });
            });

        fetch('footer.html')
            .then(response => response.text())
            .then(html => {
                document.getElementById('footer-placeholder').innerHTML = html;
            });
    </script>

</body>

</html>
